        // console.log(i);

        for (let i = 0; i<todos.length; i++) {

        //중첩반복문
        let output3 ='';

        for (let i = 1; i<10; i++) {

            for (let j = 0; j < i; j++) {
                output3 += '*'
            }
            output3 += '<br>'
        }
        console.log(output3)
        document.querySelector('h1').innerHTML = output3;

        let output4 = '';
        for (let i = 1 ; i<15; i++) {
            for (let j = 15; j > i; j--) {
                output4 += '&nbsp; '
            }

            for (let k = 0; k < 2 * i - 1; k++){
                output4 += '*'
            }
            output4 += '<br>'

        }
        document.querySelector('.pyramid1').innerHTML = output4;

        let output5 = '';
        for (let i = 14 ; i > 0; i--) {

            }
            for (let k = 0; k < 2 * i - 1; k++){

            }

        }
