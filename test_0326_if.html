<body>
    <script>
        // if조건문
        if( 273 < 100) {
            alert('273 < 100 => true')
        }
        // 프로그램 종료
        // alert('종료')

        const date = new Date()
        // console.log(date.getFullYear())
        const hour = date.getHours()
        if (hour < 11) { 
            alert('아침 먹을 시간입니다.') 
        } else if (hour < 15) {
            alert('점심 먹을 시간입니다.')
        } else {

            alert('저녁 먹을 시간입니다.')
        }

        const x = prompt('조건에 맞는 숫자를 입력하세요')
        if(x > 10) {
            if( x < 20) {
                console.log('조건에 맞습니다.')
            }
        }
        

    </script>
